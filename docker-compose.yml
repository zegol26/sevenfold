services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexus_sevenfold
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_local_only
    ports:
      - "5432:5432"
    volumes:
      - nexus_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_sevenfold"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nexus_postgres:
